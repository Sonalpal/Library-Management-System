<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h2>Sign in</h2>
        <p class="subtitle">Access your library system</p>

        <input type="email" id="email" placeholder="Email address" />
        <input type="password" id="password" placeholder="Password" />

        <button id="loginBtn">Sign In</button>

        <p class="bottom-text">
          Don't have an account?
          <a href="../signup/signup.html">Create one</a>
        </p>
      </div>
    </div>

    <script type="module" src="login.js"></script>
  </body>
</html>
